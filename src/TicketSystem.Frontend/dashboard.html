<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard - TicketSystem</title>
        <link rel="icon" href="data:," />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --primary: #6366f1;
                --bg: #0f172a;
                --surface: rgba(30, 41, 59, 0.8);
                --text: #f8fafc;
                --text-muted: #94a3b8;
                --border: rgba(255, 255, 255, 0.1);
                --success: #22c55e;
                --secondary: #ec4899;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Inter", sans-serif;
            }

            body {
                background: var(--bg);
                background-image:
                    radial-gradient(
                        circle at 10% 20%,
                        rgba(99, 102, 241, 0.12) 0%,
                        transparent 40%
                    ),
                    radial-gradient(
                        circle at 90% 80%,
                        rgba(236, 72, 153, 0.12) 0%,
                        transparent 40%
                    );
                color: var(--text);
                min-height: 100vh;
                padding: 40px;
            }

            .page-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 36px;
            }

            h1 {
                font-size: 1.8rem;
                font-weight: 700;
            }
            h1 span {
                color: var(--text-muted);
                font-size: 1rem;
                font-weight: 400;
                margin-left: 12px;
            }

            .actions {
                display: flex;
                gap: 10px;
                align-items: center;
            }

            .btn {
                padding: 10px 18px;
                border-radius: 10px;
                border: none;
                cursor: pointer;
                font-weight: 600;
                font-size: 0.9rem;
                transition: all 0.2s;
            }

            .btn-primary {
                background: var(--primary);
                color: white;
            }
            .btn-primary:hover {
                opacity: 0.85;
                transform: translateY(-1px);
            }

            .btn-ghost {
                background: var(--surface);
                color: var(--text-muted);
                border: 1px solid var(--border);
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .btn-ghost:hover {
                color: var(--text);
                border-color: rgba(255, 255, 255, 0.25);
            }

            .table-wrapper {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
                backdrop-filter: blur(12px);
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            thead th {
                background: rgba(0, 0, 0, 0.25);
                padding: 14px 20px;
                text-align: left;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: var(--text-muted);
                border-bottom: 1px solid var(--border);
            }

            tbody td {
                padding: 16px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                font-size: 0.9rem;
            }

            tbody tr:last-child td {
                border-bottom: none;
            }
            tbody tr:hover {
                background: rgba(255, 255, 255, 0.02);
            }

            .badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 6px;
                font-size: 0.75rem;
                font-weight: 700;
            }

            .badge-admin {
                background: rgba(236, 72, 153, 0.15);
                color: var(--secondary);
            }
            .badge-user {
                background: rgba(99, 102, 241, 0.15);
                color: var(--primary);
            }

            .muted {
                color: var(--text-muted);
                font-size: 0.82rem;
            }

            .state {
                text-align: center;
                padding: 60px 20px;
                color: var(--text-muted);
            }

            .spinner {
                width: 36px;
                height: 36px;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-left-color: var(--primary);
                border-radius: 50%;
                animation: spin 0.9s linear infinite;
                margin: 0 auto 14px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .error-bar {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.3);
                color: #fca5a5;
                padding: 14px 18px;
                border-radius: 10px;
                margin-bottom: 20px;
                display: none;
                font-size: 0.9rem;
            }

            code {
                background: rgba(255, 255, 255, 0.06);
                padding: 2px 6px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.8rem;
            }
        </style>
    </head>
    <body>
        <div class="page-header">
            <h1>Dashboard <span>Active Sessions</span></h1>
            <div class="actions">
                <a href="admin.html" class="btn btn-ghost">← Back to Admin</a>
                <button class="btn btn-primary" onclick="load()">
                    ↻ Refresh
                </button>
            </div>
        </div>

        <div id="errorBar" class="error-bar"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Role</th>
                        <th>User / Admin ID</th>
                        <th>IP Address</th>
                        <th>User Agent</th>
                        <th>Last Used</th>
                        <th>Expires At</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
            <div id="state" class="state">
                <div class="spinner"></div>
                <p>Loading sessions…</p>
            </div>
        </div>

        <script type="module" src="js/pages/dashboard.js"></script>
    </body>
</html>
